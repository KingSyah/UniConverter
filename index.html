<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arcane Converter</title>
  <meta name="description" content="Convert between Standard, Traditional & Fantasy measurement units">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Arcane Converter</h1>
      <p class="subtitle">Standard · Traditional · Fantasy</p>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>
    </header>

    <!-- Category Filters -->
    <div class="filters" id="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="standard">Standard</button>
      <button class="filter-btn" data-filter="traditional">Traditional</button>
      <button class="filter-btn" data-filter="fantasy">Fantasy</button>
    </div>

    <!-- Converter Card -->
    <div class="converter">
      <!-- Value Input -->
      <div class="input-group">
        <label for="inputValue">Value</label>
        <input type="number" id="inputValue" min="0" step="any" value="1" placeholder="0">
      </div>

      <!-- From -->
      <div class="input-group">
        <label for="fromUnit">From</label>
        <input type="text" id="searchFrom" class="search-input" placeholder="🔍 Search units…" autocomplete="off">
        <select id="fromUnit"></select>
        <div class="info" id="fromInfo"></div>
      </div>

      <!-- Swap -->
      <div class="swap">
        <button id="swapBtn" aria-label="Swap units">⇅</button>
      </div>

      <!-- To -->
      <div class="input-group">
        <label for="toUnit">To</label>
        <input type="text" id="searchTo" class="search-input" placeholder="🔍 Search units…" autocomplete="off">
        <select id="toUnit"></select>
        <div class="info" id="toInfo"></div>
      </div>

      <!-- Result -->
      <div class="result">
        <div id="output">--</div>
      </div>

      <!-- Controls -->
      <div class="controls">
        <div class="precision-control">
          <label for="precision">Decimals</label>
          <input type="number" id="precision" class="precision" value="4" min="0" max="10">
        </div>
        <button class="add-custom" id="addCustomBtn">+ Custom Unit</button>
      </div>
    </div>
  </div>

    <!-- Footer -->
    <footer class="footer">
      <div class="footer-inner">
        <span class="footer-icon">⚡</span>
        <span class="footer-text" id="copyright-text"></span>
        <span class="footer-icon">⚡</span>
      </div>
      <div class="footer-links">
        <a href="https://github.com" target="_blank" rel="noopener">GitHub</a>
        <span class="footer-sep">·</span>
        <a href="CHANGELOG.md" target="_blank" rel="noopener">Changelog</a>
        <span class="footer-sep">·</span>
        <a href="COPYRIGHT.md" target="_blank" rel="noopener">License</a>
      </div>
    </footer>
  </div>

  <!-- Custom Unit Modal -->
  <div class="modal" id="customModal">
    <div class="modal-content">
      <h2>Add Custom Unit</h2>

      <div class="form-group">
        <label for="customName">Unit Name</label>
        <input type="text" id="customName" placeholder="e.g. Mana Crystal" autocomplete="off">
      </div>

      <div class="form-group">
        <label for="customGrams">Grams per Unit</label>
        <input type="number" id="customGrams" step="any" placeholder="e.g. 125.5">
      </div>

      <div class="form-group">
        <label for="customCategory">Category</label>
        <select id="customCategory">
          <option value="standard">Standard</option>
          <option value="traditional">Traditional</option>
          <option value="fantasy" selected>Fantasy</option>
        </select>
      </div>

      <div class="form-group">
        <label for="customDesc">Description (optional)</label>
        <textarea id="customDesc" placeholder="Brief explanation of the unit"></textarea>
      </div>

      <div class="modal-buttons">
        <button class="cancel-btn" id="cancelCustom">Cancel</button>
        <button class="confirm-btn" id="confirmAdd">Add Unit</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
